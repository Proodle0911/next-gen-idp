name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test
        run: go test ./...

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            my-user/my-app:${{ github.sha }}
            ${{ github.event_name == 'pull_request' && format('my-user/my-app:pr-{0}-{1}', github.event.number, github.sha) || '' }}

      # For dynamic previews, ArgoCD ApplicationSet handles the deployment
      # For production, we would update the deployment manifest here
      - name: Update Production Manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" k8s/production/values.yaml
          git config --global user.email "ci@idp.example.com"
          git config --global user.name "CI Bot"
          git add k8s/production/values.yaml
          git commit -m "chore: bump production image to ${{ github.sha }}"
          git push
