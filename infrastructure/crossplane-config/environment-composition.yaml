apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: local-environment
  labels:
    provider: kubernetes
spec:
  compositeTypeRef:
    apiVersion: idp.example.com/v1alpha1
    kind: XEnvironment
  resources:
  - name: namespace
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      spec:
        forProvider:
          manifest:
            apiVersion: v1
            kind: Namespace
            metadata:
              name: environment-placeholder
    patches:
    - fromFieldPath: "metadata.labels['crossplane.io/claim-name']"
      toFieldPath: "spec.forProvider.manifest.metadata.name"
  - name: resource-quota
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      spec:
        forProvider:
          manifest:
            apiVersion: v1
            kind: ResourceQuota
            metadata:
              namespace: environment-placeholder
            spec:
              hard:
                requests.storage: 1Gi
    patches:
    - fromFieldPath: "metadata.labels['crossplane.io/claim-name']"
      toFieldPath: "spec.forProvider.manifest.metadata.namespace"
    - fromFieldPath: "spec.quotaGb"
      toFieldPath: "spec.forProvider.manifest.spec.hard['requests.storage']"
      transforms:
      - type: string
        string:
          fmt: "%dGi"
