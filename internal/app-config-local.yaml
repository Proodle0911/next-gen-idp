app:
  baseUrl: http://localhost:7000

backend:
  baseUrl: http://localhost:7000
  cors:
    origin: http://localhost:7000
    methods: [GET, POST, PUT, DELETE]
    credentials: true
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  database:
    client: sqlite3
    connection: ':memory:'

catalog:
  locations:
    - type: file
      target: /var/backstage/templates/template.yaml
